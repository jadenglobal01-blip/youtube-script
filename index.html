<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>유튜브 대본 생성기</title>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d2e;
  --border: #2a2d3e;
  --text: #e8eaf6;
  --muted: #8b90a0;
  --primary: #5c6bc0;
  --primary-light: #7986cb;
  --success: #26a69a;
  --danger: #ef5350;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', 'Apple SD Gothic Neo', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
.container { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
header { text-align: center; margin-bottom: 40px; }
header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
header h1 span { color: var(--primary-light); }
header p { color: var(--muted); font-size: 15px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
}
.card h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
input[type="text"], input[type="password"] {
  width: 100%;
  background: #0f1117;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
}
input[type="text"]:focus, input[type="password"]:focus { border-color: var(--primary); }
.row { display: flex; gap: 10px; }
.row input { flex: 1; }
button {
  background: var(--primary);
  border: none;
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 20px;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
}
button:hover { background: var(--primary-light); }
button:active { transform: scale(0.98); }
button.secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
}
button.secondary:hover { background: var(--border); color: var(--text); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.type-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.type-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--muted);
  font-size: 13px;
  padding: 6px 16px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
}
.type-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}
.video-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
.video-card {
  background: #0f1117;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  display: flex;
  gap: 12px;
  cursor: pointer;
  transition: border-color 0.15s;
  align-items: flex-start;
}
.video-card:hover { border-color: var(--primary); }
.video-card.selected { border-color: var(--primary); background: rgba(92,107,192,0.1); }
.video-card img { width: 120px; min-width: 120px; height: 68px; object-fit: cover; border-radius: 6px; background: var(--border); }
.video-info { flex: 1; min-width: 0; }
.video-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.video-meta { font-size: 12px; color: var(--muted); }
.video-check { font-size: 20px; color: var(--primary); display: none; align-self: center; }
.video-card.selected .video-check { display: block; }
.badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: rgba(92,107,192,0.2); color: var(--primary-light); margin-right: 6px; }
.script-box {
  background: #0f1117;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  font-size: 14px;
  line-height: 1.9;
  white-space: pre-wrap;
  max-height: 600px;
  overflow-y: auto;
  margin-top: 12px;
}
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.toolbar-btns { display: flex; gap: 8px; }
.loading { text-align: center; padding: 40px 20px; color: var(--muted); }
.loading .spinner { font-size: 32px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { background: rgba(239,83,80,0.1); border: 1px solid rgba(239,83,80,0.3); border-radius: 8px; color: #ef9a9a; font-size: 13px; padding: 10px 14px; margin-top: 12px; display: none; }
.info { color: var(--muted); font-size: 13px; margin-top: 8px; }
.hidden { display: none; }
.count-info { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
.generate-row { display: flex; justify-content: flex-end; margin-top: 12px; }
.notion-note { font-size: 12px; color: var(--muted); text-align: right; margin-top: 8px; }
footer { text-align: center; color: var(--muted); font-size: 13px; margin-top: 40px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>유튜브 <span>대본 생성기</span></h1>
    <p>터진 영상 분석 → AI 대본 자동 생성</p>
  </header>

  <div class="card">
    <h2>🔑 API 설정</h2>
    <label>YouTube Data API 키</label>
    <input type="password" id="ytKey" placeholder="AIzaSy..." />
    <p class="info" style="margin-top:6px;">* 키는 브라우저에만 저장되며 외부로 전송되지 않습니다</p>
  </div>

  <div class="card">
    <h2>🔍 키워드 검색</h2>
    <label>검색 키워드</label>
    <div class="row">
      <input type="text" id="keyword" placeholder="예: 아마존 셀러, 직장인 부업, 퇴사 준비..." onkeydown="if(event.key==='Enter') searchVideos()" />
      <button onclick="searchVideos()" id="searchBtn">검색</button>
    </div>
    <div>
      <label style="margin-top:16px;">콘텐츠 유형</label>
      <div class="type-btns">
        <button class="type-btn active" onclick="setType('long',this)">롱폼 (유튜브)</button>
        <button class="type-btn" onclick="setType('short',this)">숏폼 (쇼츠/릴스)</button>
        <button class="type-btn" onclick="setType('both',this)">둘 다</button>
      </div>
    </div>
    <div id="searchError" class="error"></div>
  </div>

  <div class="card hidden" id="resultCard">
    <div class="toolbar">
      <div>
        <h2 style="margin-bottom:4px;">📊 검색 결과</h2>
        <p class="count-info" id="countInfo"></p>
      </div>
      <div class="generate-row">
        <button onclick="generateScript()" id="genBtn" disabled>✨ 선택 영상으로 대본 생성</button>
      </div>
    </div>
    <div class="video-grid" id="videoGrid"></div>
  </div>

  <div class="card hidden" id="loadingCard">
    <div class="loading">
      <div class="spinner">⟳</div>
      <p id="loadingMsg">검색 중...</p>
    </div>
  </div>

  <div class="card hidden" id="scriptCard">
    <div class="toolbar">
      <h2>📝 생성된 대본</h2>
      <div class="toolbar-btns">
        <button class="secondary" onclick="copyScript()">복사</button>
        <button class="secondary" onclick="resetScript()">다시하기</button>
      </div>
    </div>
    <div class="script-box" id="scriptBox"></div>
    <p class="notion-note">* Notion 자동저장은 추후 업데이트 예정</p>
  </div>

  <footer>제이든글로벌 콘텐츠 도구 · YouTube Data API v3</footer>
</div>

<script>
const $ = id => document.getElementById(id);
let selectedType = 'long';
let selectedVideos = [];
let allVideos = [];

function setType(t, btn) {
  selectedType = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function showError(id, msg) {
  const el = $(id);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function showLoading(msg) {
  $('loadingCard').classList.remove('hidden');
  $('resultCard').classList.add('hidden');
  $('loadingMsg').textContent = msg;
}

function hideLoading() {
  $('loadingCard').classList.add('hidden');
}

function formatViews(n) {
  n = parseInt(n);
  if (n >= 100000000) return Math.round(n/100000000) + '억';
  if (n >= 10000) return Math.round(n/10000) + '만';
  if (n >= 1000) return (n/1000).toFixed(1) + '천';
  return n.toLocaleString();
}

async function searchVideos() {
  const key = $('ytKey').value.trim();
  const kw = $('keyword').value.trim();
  if (!key) return showError('searchError', 'YouTube API 키를 입력해주세요.');
  if (!kw) return showError('searchError', '검색 키워드를 입력해주세요.');

  selectedVideos = [];
  $('scriptCard').classList.add('hidden');
  showLoading('유튜브 영상 검색 중...');

  try {
    const dur = selectedType === 'short' ? '&videoDuration=short' : selectedType === 'long' ? '&videoDuration=long' : '';
    const r1 = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(kw)}&type=video&maxResults=20&order=viewCount&relevanceLanguage=ko${dur}&key=${key}`);
    const d1 = await r1.json();
    if (d1.error) throw new Error(d1.error.message);

    const ids = d1.items.map(i => i.id.videoId).join(',');
    const r2 = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${ids}&key=${key}`);
    const d2 = await r2.json();

    const statsMap = {};
    d2.items.forEach(v => statsMap[v.id] = v.statistics);

    allVideos = d1.items.map(item => ({
      id: item.id.videoId,
      title: item.snippet.title,
      channel: item.snippet.channelTitle,
      thumb: item.snippet.thumbnails.medium?.url || '',
      views: parseInt(statsMap[item.id.videoId]?.viewCount || 0),
    }))
    .filter(v => v.views >= 1000)
    .sort((a,b) => b.views - a.views)
    .slice(0, 10);

    hideLoading();
    renderVideos(kw);
  } catch(e) {
    hideLoading();
    showError('searchError', '오류: ' + e.message);
  }
}

function renderVideos(kw) {
  const grid = $('videoGrid');
  grid.innerHTML = '';
  $('countInfo').textContent = `"${kw}" 검색결과 · 조회수 1천 이상 상위 ${allVideos.length}개`;
  $('resultCard').classList.remove('hidden');

  allVideos.forEach((v, i) => {
    const el = document.createElement('div');
    el.className = 'video-card';
    el.id = 'vc' + i;
    el.innerHTML = `
      <img src="${v.thumb}" alt="" loading="lazy" />
      <div class="video-info">
        <div class="video-title">${v.title}</div>
        <div class="video-meta">${v.channel} · 조회수 ${formatViews(v.views)}회</div>
      </div>
      <div class="video-check">✓</div>
    `;
    el.onclick = () => toggleVideo(i, v, el);
    grid.appendChild(el);
  });
}

function toggleVideo(i, v, el) {
  const idx = selectedVideos.findIndex(x => x.id === v.id);
  if (idx === -1) {
    if (selectedVideos.length >= 5) { showError('searchError', '최대 5개까지 선택 가능해요.'); return; }
    selectedVideos.push(v);
    el.classList.add('selected');
  } else {
    selectedVideos.splice(idx, 1);
    el.classList.remove('selected');
  }
  $('genBtn').disabled = selectedVideos.length === 0;
}

function generateScript() {
  if (selectedVideos.length === 0) return;
  const kw = $('keyword').value.trim();
  const typeLabel = selectedType === 'long' ? '롱폼(유튜브 본편)' : selectedType === 'short' ? '숏폼(쇼츠/릴스/틱톡)' : '롱폼 + 숏폼';
  const videoList = selectedVideos.map((v,i) => `${i+1}. [${formatViews(v.views)}회] ${v.title} (${v.channel})`).join('\n');

  const prompt = `유튜브 키워드 "${kw}"로 검색한 인기 영상 ${selectedVideos.length}개를 분석해서 실제 촬영 가능한 대본을 작성해줘.

선택된 인기 영상:
${videoList}

콘텐츠 유형: ${typeLabel}

다음 형식으로 작성해줘:

【핵심 인사이트 분석】
위 영상들의 공통 키워드, 후킹 포인트, 시청자 니즈 분석 (3~5줄)

${selectedType !== 'short' ? `【롱폼 대본 (10~15분 분량)】
- 후킹 오프닝 (0~30초): 시청자를 잡는 강렬한 첫 문장
- 본론 섹션 1: 소제목 + 내용
- 본론 섹션 2: 소제목 + 내용  
- 본론 섹션 3: 소제목 + 내용
- 클로징 + CTA (구독, 좋아요 유도)

` : ''}${selectedType !== 'long' ? `【숏폼 대본 (60초 이내)】
- 1초 후킹 문장 (강렬하게)
- 핵심 내용 3포인트
- 마무리 CTA

` : ''}한국어로 작성하고, 말투는 친근하고 자연스럽게. 채널 타겟: 직장인/부업러/경제적 자유를 원하는 2~40대.`;

  $('scriptBox').textContent = '대본 생성 중입니다. 아래 Claude 채팅창에서 확인하세요.\n\n프롬프트가 복사됩니다 — Claude.ai에서 붙여넣기 하세요.';
  $('scriptCard').classList.remove('hidden');
  $('scriptCard').scrollIntoView({ behavior: 'smooth' });

  navigator.clipboard.writeText(prompt).catch(() => {});
  $('scriptBox').textContent = prompt;
}

function copyScript() {
  navigator.clipboard.writeText($('scriptBox').textContent).then(() => {
    const btn = event.target;
    btn.textContent = '복사됨 ✓';
    setTimeout(() => btn.textContent = '복사', 2000);
  });
}

function resetScript() {
  $('scriptCard').classList.add('hidden');
  selectedVideos = [];
  document.querySelectorAll('.video-card').forEach(el => el.classList.remove('selected'));
  $('genBtn').disabled = true;
}

window.onload = () => {
  const saved = localStorage.getItem('ytApiKey');
  if (saved) $('ytKey').value = saved;
  $('ytKey').addEventListener('change', () => localStorage.setItem('ytApiKey', $('ytKey').value));
};
</script>
</body>
</html>
