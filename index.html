<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>유튜브 대본 생성기</title>
<style>
:root {
  --bg: #0d1117;
  --nav: #161b22;
  --card: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #7d8590;
  --primary: #4493f8;
  --primary-dark: #1f6feb;
  --success: #3fb950;
  --danger: #f85149;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

nav {
  background: var(--nav);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-logo { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.nav-logo .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); display: inline-block; }
.nav-badge { font-size: 12px; background: rgba(68,147,248,0.15); color: var(--primary); border: 1px solid rgba(68,147,248,0.3); border-radius: 999px; padding: 3px 10px; }

.wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }

.search-area { margin-bottom: 28px; }
.search-area h1 { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
.search-area h1 span { color: var(--primary); }

.search-row { display: flex; gap: 10px; margin-bottom: 12px; }
.search-input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 15px;
  padding: 11px 16px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--primary); }
.search-input::placeholder { color: var(--muted); }

.btn {
  background: var(--primary);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  padding: 11px 20px;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--primary-dark); }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 13px;
  padding: 7px 14px;
}
.btn-ghost:hover { background: var(--card); color: var(--text); }
.btn-ghost.active { border-color: var(--primary); color: var(--primary); background: rgba(68,147,248,0.1); }

.type-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.type-label { font-size: 13px; color: var(--muted); margin-right: 4px; }

.api-toggle { font-size: 13px; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
.api-toggle:hover { color: var(--text); }
.api-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  display: none;
}
.api-panel.open { display: block; }
.api-item label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }
.api-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  font-family: monospace;
  padding: 8px 12px;
  outline: none;
}
.api-input:focus { border-color: var(--primary); }

.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.result-title { font-size: 14px; color: var(--muted); }
.result-title b { color: var(--text); }

.generate-btn {
  background: var(--success);
  font-size: 14px;
  padding: 10px 20px;
  border-radius: var(--radius);
  border: none;
  color: #fff;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s;
}
.generate-btn:hover { background: #2ea043; }

.video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; margin-bottom: 20px; }
.video-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
  position: relative;
}
.video-card:hover { border-color: var(--primary); transform: translateY(-2px); }
.video-card.selected { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(68,147,248,0.3); }
.video-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: var(--border); display: block; }
.video-body { padding: 10px 12px; }
.video-title { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.video-meta { font-size: 12px; color: var(--muted); }
.video-views { font-size: 12px; color: var(--primary); font-weight: 600; margin-top: 4px; }
.video-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
.check-badge {
  position: absolute;
  top: 8px; right: 8px;
  width: 24px; height: 24px;
  background: var(--primary);
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: #fff;
  font-weight: 700;
}
.video-card.selected .check-badge { display: flex; }
.rank-badge {
  position: absolute;
  top: 8px; left: 8px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
}

/* Claude 연동 안내 박스 */
.claude-guide {
  background: rgba(68,147,248,0.08);
  border: 1px solid rgba(68,147,248,0.25);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 20px;
  display: none;
}
.claude-guide h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--primary); }
.claude-guide p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
.claude-guide .open-btn {
  background: #cc785c;
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  padding: 10px 20px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s;
}
.claude-guide .open-btn:hover { background: #b5674d; }

.prompt-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
  margin-top: 12px;
  color: var(--muted);
}

.loading-wrap { text-align: center; padding: 60px 20px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { font-size: 14px; color: var(--muted); }

.error-box { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); border-radius: var(--radius); color: #ff7b72; font-size: 13px; padding: 12px 16px; margin-top: 12px; display: none; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }

.hidden { display: none !important; }

@media (max-width: 600px) {
  .video-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <span class="dot"></span>
    유튜브 대본 생성기
  </div>
  <div class="nav-right">
    <span class="nav-badge">제이든글로벌</span>
  </div>
</nav>

<div class="wrap">
  <div class="search-area">
    <h1>터진 영상 분석 → <span>AI 대본 자동 생성</span></h1>

    <div class="api-toggle" onclick="toggleApi()">
      ⚙️ API 설정 <span id="apiStatus"></span>
    </div>
    <div class="api-panel" id="apiPanel">
      <div class="api-item">
        <label>YouTube Data API 키</label>
        <input type="password" class="api-input" id="ytKey" placeholder="AIzaSy..." />
      </div>
    </div>

    <div class="search-row">
      <input type="text" class="search-input" id="keyword" placeholder="키워드 입력 (예: 아마존 셀러, 직장인 부업, 퇴사 준비...)" onkeydown="if(event.key==='Enter') search()" />
      <button class="btn" onclick="search()">🔍 검색</button>
    </div>

    <div class="type-row">
      <span class="type-label">콘텐츠 유형:</span>
      <button class="btn-ghost active" onclick="setType('long',this)">롱폼 (유튜브)</button>
      <button class="btn-ghost" onclick="setType('short',this)">숏폼 (쇼츠/릴스)</button>
      <button class="btn-ghost" onclick="setType('both',this)">둘 다</button>
    </div>

    <div class="error-box" id="searchError"></div>
  </div>

  <div id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="icon">🎬</div>
      <p>키워드를 입력하고 검색해보세요</p>
    </div>

    <div class="hidden" id="loadingArea">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <p class="loading-msg">검색 중...</p>
      </div>
    </div>

    <div class="hidden" id="resultArea">
      <div class="result-header">
        <p class="result-title" id="resultTitle"></p>
        <button class="generate-btn hidden" id="genBtn" onclick="generatePrompt()">
          ✨ 선택 영상으로 대본 생성
        </button>
      </div>
      <div class="video-grid" id="videoGrid"></div>
    </div>

    <div class="claude-guide" id="claudeGuide">
      <h3>📋 Claude에서 대본 생성하기</h3>
      <p>아래 버튼을 클릭하면 Claude.ai가 새 탭으로 열려요.<br>프롬프트가 자동으로 복사되어 있으니 붙여넣기(Ctrl+V)만 하면 대본이 생성됩니다!</p>
      <button class="open-btn" onclick="openClaude()">
        🤖 Claude.ai에서 대본 생성하기 →
      </button>
      <div class="prompt-box" id="promptBox"></div>
      <p style="font-size:12px; color:var(--muted); margin-top:10px;">* 프롬프트가 클립보드에 자동 복사됩니다. Claude.ai에서 Ctrl+V 붙여넣기 하세요.</p>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let selectedType = 'long';
let selectedVideos = [];
let currentPrompt = '';

function toggleApi() {
  $('apiPanel').classList.toggle('open');
}

function setType(t, btn) {
  selectedType = t;
  document.querySelectorAll('.btn-ghost').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function showError(msg) {
  const el = $('searchError');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function formatDate(d) {
  const date = new Date(d);
  const y = date.getFullYear();
  const m = date.getMonth() + 1;
  const day = date.getDate();
  return `${y}.${String(m).padStart(2,"0")}.${String(day).padStart(2,"0")} 업로드`;
}

function formatViews(n) {
  n = parseInt(n);
  if (n >= 100000000) return Math.round(n/100000000) + '억';
  if (n >= 10000) return Math.round(n/10000) + '만';
  if (n >= 1000) return (n/1000).toFixed(1) + '천';
  return n.toLocaleString();
}

async function search() {
  const ytKey = $('ytKey').value.trim();
  const kw = $('keyword').value.trim();
  if (!ytKey) { $('apiPanel').classList.add('open'); return showError('YouTube API 키를 입력해주세요.'); }
  if (!kw) return showError('검색 키워드를 입력해주세요.');

  selectedVideos = [];
  $('emptyState').classList.add('hidden');
  $('resultArea').classList.add('hidden');
  $('claudeGuide').style.display = 'none';
  $('loadingArea').classList.remove('hidden');

  try {
    const sixMonthsAgo = new Date();
    sixMonthsAgo.setFullYear(sixMonthsAgo.getFullYear() - 1);
    const publishedAfter = sixMonthsAgo.toISOString();

    const dur = selectedType === 'short' ? '&videoDuration=short' : selectedType === 'long' ? '&videoDuration=long' : '';
    const r1 = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(kw)}&type=video&maxResults=20&order=viewCount&relevanceLanguage=ko&publishedAfter=${publishedAfter}${dur}&key=${ytKey}`);
    const d1 = await r1.json();
    if (d1.error) throw new Error(d1.error.message);

    const ids = d1.items.map(i => i.id.videoId).join(',');
    const r2 = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${ids}&key=${ytKey}`);
    const d2 = await r2.json();
    const statsMap = {};
    d2.items.forEach(v => statsMap[v.id] = v.statistics);

    const videos = d1.items.map(item => ({
      id: item.id.videoId,
      title: item.snippet.title,
      channel: item.snippet.channelTitle,
      thumb: item.snippet.thumbnails.medium?.url || '',
      views: parseInt(statsMap[item.id.videoId]?.viewCount || 0),
      publishedAt: item.snippet.publishedAt,
      publishedAt: item.snippet.publishedAt,
    }))
    .filter(v => v.views >= 5000)
    .sort((a,b) => b.views - a.views)
    .slice(0, 12);

    $('loadingArea').classList.add('hidden');

    if (videos.length === 0) {
      $('emptyState').classList.remove('hidden');
      showError('최근 6개월 내 조회수 1만 이상 영상이 없어요. 다른 키워드로 검색해보세요.');
      return;
    }

    window._videos = videos;
    renderVideos(kw, videos);
  } catch(e) {
    $('loadingArea').classList.add('hidden');
    $('emptyState').classList.remove('hidden');
    showError('오류: ' + e.message);
  }
}

function renderVideos(kw, videos) {
  const grid = $('videoGrid');
  grid.innerHTML = '';
  $('resultTitle').innerHTML = `<b>"${kw}"</b> · 최근 1년 · 조회수 5천+ · 상위 ${videos.length}개`;
  $('resultArea').classList.remove('hidden');

  videos.forEach((v, i) => {
    const el = document.createElement('div');
    el.className = 'video-card';
    el.innerHTML = `
      <div style="position:relative;">
        <img class="video-thumb" src="${v.thumb}" alt="" loading="lazy" />
        <span class="rank-badge">${i+1}</span>
        <span class="check-badge">✓</span>
      </div>
      <div class="video-body">
        <div class="video-title">${v.title}</div>
        <div class="video-meta">${v.channel}</div>
        <div class="video-views">조회수 ${formatViews(v.views)}회</div>
        <div class="video-date">${formatDate(v.publishedAt)}</div>
      </div>
    `;
    el.onclick = () => toggleVideo(v, el);
    grid.appendChild(el);
  });
}

function toggleVideo(v, el) {
  const idx = selectedVideos.findIndex(x => x.id === v.id);
  if (idx === -1) {
    if (selectedVideos.length >= 5) return showError('최대 5개까지 선택 가능해요.');
    selectedVideos.push(v);
    el.classList.add('selected');
  } else {
    selectedVideos.splice(idx, 1);
    el.classList.remove('selected');
  }
  $('genBtn').classList.toggle('hidden', selectedVideos.length === 0);
}

function generatePrompt() {
  if (selectedVideos.length === 0) return;
  const kw = $('keyword').value.trim();
  const typeLabel = selectedType === 'long' ? '롱폼(유튜브 본편)' : selectedType === 'short' ? '숏폼(쇼츠/릴스/틱톡)' : '롱폼 + 숏폼';
  const videoList = selectedVideos.map((v,i) => `${i+1}. [${formatViews(v.views)}회] ${v.title} (${v.channel})`).join('\n');

  currentPrompt = `유튜브 키워드 "${kw}"로 검색한 인기 영상 ${selectedVideos.length}개를 분석해서 실제 촬영 가능한 대본을 작성해줘.

선택된 인기 영상:
${videoList}

콘텐츠 유형: ${typeLabel}

다음 형식으로 작성해줘:

【핵심 인사이트 분석】
위 영상들의 공통 키워드, 후킹 포인트, 시청자 니즈 분석 (3~5줄)

${selectedType !== 'short' ? `【롱폼 대본 (10~15분 분량)】
- 후킹 오프닝 (0~30초): 시청자를 잡는 강렬한 첫 문장
- 본론 섹션 1: 소제목 + 내용
- 본론 섹션 2: 소제목 + 내용
- 본론 섹션 3: 소제목 + 내용
- 클로징 + CTA (구독, 좋아요 유도)
` : ''}${selectedType !== 'long' ? `【숏폼 대본 (60초 이내)】
- 1초 후킹 문장 (강렬하게)
- 핵심 내용 3포인트
- 마무리 CTA
` : ''}
한국어로 작성하고, 말투는 친근하고 자연스럽게. 채널 타겟: 직장인/부업러/경제적 자유를 원하는 2~40대.`;

  navigator.clipboard.writeText(currentPrompt).catch(() => {});
  $('promptBox').textContent = currentPrompt;
  $('claudeGuide').style.display = 'block';
  $('claudeGuide').scrollIntoView({ behavior: 'smooth' });
}

function openClaude() {
  navigator.clipboard.writeText(currentPrompt).then(() => {
    window.open('https://claude.ai', '_blank');
  }).catch(() => {
    window.open('https://claude.ai', '_blank');
  });
}

window.onload = () => {
  const yt = localStorage.getItem('ytKey');
  if (yt) { $('ytKey').value = yt; $('apiStatus').textContent = '✓ 저장됨'; }
  else { $('apiStatus').textContent = '⚠ 키 입력 필요'; $('apiPanel').classList.add('open'); }
  $('ytKey').addEventListener('change', () => { localStorage.setItem('ytKey', $('ytKey').value); $('apiStatus').textContent = '✓ 저장됨'; });
};
</script>
</body>
</html>
